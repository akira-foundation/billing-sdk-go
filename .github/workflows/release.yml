name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: "1.23"

      - name: Test
        run: go test ./...

      - name: Install git-cliff
        uses: taiki-e/install-action@e03236526ace47fa2e04bebcfc6da471ebd4690c # v2.49.0
        with:
          tool: git-cliff

      - name: Generate CHANGELOG
        run: git-cliff --config cliff.toml --tag "${{ github.ref_name }}" --output CHANGELOG.md

      - name: Ensure CHANGELOG contains tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DATE="$(date -u +%F)"
          if ! grep -q "^## \\[$VERSION\\]" CHANGELOG.md; then
            awk -v version="$VERSION" -v date="$DATE" '
              BEGIN {
                inserted = 0
                entry = "## [" version "] - " date "\n\n### Changed\n\n- Release v" version ".\n"
              }
              /^## \[/ && inserted == 0 {
                print entry
                inserted = 1
              }
              { print }
              END {
                if (inserted == 0) {
                  print ""
                  print entry
                }
              }
            ' CHANGELOG.md > CHANGELOG.md.tmp
            mv CHANGELOG.md.tmp CHANGELOG.md
          fi

      - name: Commit CHANGELOG
        run: |
          git config user.name "$(git show -s --format='%an' HEAD)"
          git config user.email "$(git show -s --format='%ae' HEAD)"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore(changelog): ${{ github.ref_name }}"
          git push origin HEAD:main || true

      - name: Extract release notes
        id: notes
        run: |
          {
            echo 'body<<EOF'
            git-cliff --config cliff.toml --latest --strip all
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "${{ steps.notes.outputs.body }}" \
            --latest
