name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: go test ./...

      - name: Promote Unreleased to version
        run: |
          DATE=$(date -u +%Y-%m-%d)
          VERSION=${GITHUB_REF_NAME#v}
          sed -i -E "s/^## \[?[Uu]nreleased\]?/## [$VERSION] - $DATE/" CHANGELOG.md

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: release ${{ github.ref_name }}" || true

      - name: Push changelog
        run: git push origin HEAD:main || true

      - name: Extract release notes
        id: notes
        run: |
          {
            echo 'body<<EOF'
            awk '/^## \[?v?${{ steps.version.outputs.tag }}/,/^## \[?v?/' CHANGELOG.md | head -n -1
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "${{ steps.notes.outputs.body }}" \
            --latest
